<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MultihubAI — всё об ИИ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0 }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #f5f5f7; color: #1d1d1f; }
  header { background: #fff; border-bottom: 1px solid #e5e5e7; padding: 20px 0; }
  .container { max-width: 860px; margin: 0 auto; padding: 0 20px; }
  header .inner { display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 22px; font-weight: 700; }
  header p  { font-size: 14px; color: #6e6e73; margin-top: 2px; }
  .rss-badge { margin-left: auto; display: flex; align-items: center; gap: 8px;
               background: #ff6600; color: #fff; border-radius: 6px;
               padding: 6px 12px; font-size: 13px; font-weight: 600;
               text-decoration: none; white-space: nowrap; }
  .rss-badge svg { width: 14px; height: 14px; fill: #fff; }
  main { padding: 32px 0; }
  #status { text-align: center; color: #6e6e73; font-size: 15px; padding: 40px 0; }
  .articles { display: grid; gap: 20px; }
  .card { background: #fff; border-radius: 12px; overflow: hidden;
          box-shadow: 0 1px 4px rgba(0,0,0,.08); display: flex; }
  .card-img { width: 160px; min-width: 160px; background: #e5e5ea;
              overflow: hidden; }
  .card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card-img .no-img { width: 100%; height: 100%; display: flex; align-items: center;
                      justify-content: center; font-size: 40px; min-height: 120px; }
  .card-body { padding: 18px 20px; flex: 1; }
  .card-cat  { font-size: 12px; color: #ff6600; font-weight: 600;
               text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .card-title { font-size: 17px; font-weight: 700; line-height: 1.35;
                margin-bottom: 8px; }
  .card-title a { color: inherit; text-decoration: none; }
  .card-title a:hover { color: #0066cc; }
  .card-desc { font-size: 14px; color: #6e6e73; line-height: 1.5;
               display: -webkit-box; -webkit-line-clamp: 2;
               -webkit-box-orient: vertical; overflow: hidden; }
  .card-date { font-size: 12px; color: #aeaeb2; margin-top: 10px; }
  footer { text-align: center; padding: 32px 0; font-size: 13px; color: #aeaeb2; }
  footer a { color: #0066cc; text-decoration: none; }
  @media(max-width:600px){
    .card { flex-direction: column; }
    .card-img { width: 100%; min-width: unset; height: 180px; }
  }
</style>
</head>
<body>

<header>
  <div class="container">
    <div class="inner">
      <div>
        <h1>🤖 MultihubAI</h1>
        <p>Экспертные статьи об искусственном интеллекте</p>
      </div>
      <a class="rss-badge" href="feed.xml" title="Подписаться на RSS">
        <svg viewBox="0 0 24 24"><path d="M6.18 15.64a2.18 2.18 0 0 1 2.18 2.18C8.36 19.01 7.38 20 6.18 20C4.98 20 4 19.01 4 17.82a2.18 2.18 0 0 1 2.18-2.18M4 4.44A15.56 15.56 0 0 1 19.56 20h-2.83A12.73 12.73 0 0 0 4 7.27V4.44m0 5.66a9.9 9.9 0 0 1 9.9 9.9h-2.83A7.07 7.07 0 0 0 4 12.93V10.1z"/></svg>
        RSS
      </a>
    </div>
  </div>
</header>

<main>
  <div class="container">
    <div id="status">Загружаю статьи…</div>
    <div class="articles" id="articles"></div>
  </div>
</main>

<footer>
  <div class="container">
    <p>Публикуется автоматически через <a href="https://multihub.ai">multihub.ai</a> &nbsp;·&nbsp;
       <a href="feed.xml">RSS-лента</a></p>
  </div>
</footer>

<script>
const FEED_URL = 'feed.xml';

function parseDate(s) {
  try { return new Date(s).toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'}); }
  catch { return s; }
}

function getImg(item) {
  const enc = item.querySelector('enclosure');
  if (enc) return enc.getAttribute('url');
  const img = item.querySelector('content\\:encoded, encoded');
  if (img) {
    const m = img.textContent.match(/src="([^"]+)"/);
    if (m) return m[1];
  }
  return null;
}

async function loadFeed() {
  try {
    const r = await fetch(FEED_URL + '?v=' + Date.now());
    const text = await r.text();
    const parser = new DOMParser();
    const xml = parser.parseFromString(text, 'text/xml');
    const items = xml.querySelectorAll('item');

    if (!items.length) {
      document.getElementById('status').textContent = 'Статьи не найдены.';
      return;
    }
    document.getElementById('status').style.display = 'none';

    const container = document.getElementById('articles');
    items.forEach(item => {
      const title = item.querySelector('title')?.textContent || '';
      const link  = item.querySelector('link')?.textContent || '#';
      const desc  = item.querySelector('description')?.textContent || '';
      const date  = parseDate(item.querySelector('pubDate')?.textContent || '');
      const cats  = [...item.querySelectorAll('category')]
                     .map(c=>c.textContent)
                     .filter(c=>!['format-article','format-post','index','noindex',
                                  'comment-all','comment-none','comment-subscribers'].includes(c));
      const imgUrl = getImg(item);

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-img">
          ${imgUrl
            ? `<img src="${imgUrl}" alt="" loading="lazy" onerror="this.parentNode.innerHTML='<div class=no-img>🤖</div>'">`
            : `<div class="no-img">🤖</div>`}
        </div>
        <div class="card-body">
          ${cats.length ? `<div class="card-cat">${cats.slice(0,2).join(' · ')}</div>` : ''}
          <div class="card-title"><a href="${link}" target="_blank">${title}</a></div>
          <div class="card-desc">${desc}</div>
          <div class="card-date">${date}</div>
        </div>`;
      container.appendChild(card);
    });
  } catch(e) {
    document.getElementById('status').textContent = 'Ошибка загрузки: ' + e.message;
  }
}

loadFeed();
</script>
</body>
</html>
